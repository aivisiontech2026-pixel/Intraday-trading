name: Intraday Paper Trader

# Runs entirely on GitHub's servers, so it trades even when your PC is off.
# Every ~5 minutes during NSE market hours, on weekdays, it:
#   restore state -> fetch fresh 5-min bars -> signals -> paper orders -> save state
#
# The strategy squares off ALL positions at 15:15 IST, so nothing is ever held
# overnight; between-day state is just cash balance + trade history.

on:
  schedule:
    # cron is UTC. 09:30-16:25 IST == 04:00-10:55 UTC. Mon-Fri.
    # (entries 09:30-14:30 IST, forced square-off 15:15 IST — window covers it)
    - cron: '*/5 4-10 * * 1-5'
  workflow_dispatch: {}   # lets you trigger a manual run from the Actions tab

permissions:
  contents: write         # needed to push the trading-state branch

concurrency:
  group: intraday-trader  # never run two passes at once (state would race)
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata     # make date.today()/now() IST, matching the strategy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backtest-machine/requirements.txt

      - name: Install dependencies
        run: pip install -r backtest-machine/requirements.txt

      - name: Restore trading state
        run: |
          cd backtest-machine
          if git fetch origin trading-state --depth 1 2>/dev/null; then
            git show FETCH_HEAD:intraday_trades.db > intraday_trades.db
            echo "Restored prior state from trading-state branch."
          else
            echo "No prior state — starting fresh at Rs.1,00,000."
          fi

      - name: Run trader (single pass)
        run: |
          cd backtest-machine
          python intraday_trader.py | tee run_output.txt

      - name: Save trading state
        if: always()
        run: |
          cd backtest-machine
          [ -f intraday_trades.db ] || { echo "No db to save."; exit 0; }
          tmp="$(mktemp -d)"
          cp intraday_trades.db "$tmp/"
          [ -f run_output.txt ] && cp run_output.txt "$tmp/"
          cd "$tmp"
          git init -q
          git checkout -q -b trading-state
          git add -A
          git -c user.name="intraday-ci" \
              -c user.email="ci@users.noreply.github.com" \
              commit -q -m "state $(date -u +%FT%TZ)"
          git push -f \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            trading-state
